name: Monthly Minor Scraper

on:
  schedule:
    - cron: "0 4 1 */3 *" # 4AM on the 1st every 3 months (Jan, Apr, Jul, Oct)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper dependencies
        run: npm install --prefix scraper

      - name: Run minor scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scraper/minors.js
